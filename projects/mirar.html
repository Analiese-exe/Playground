<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mirar - Ukeje Analiese</title>
    <script>
      (() => {
        try {
          const savedTheme = localStorage.getItem("portfolio-theme");
          document.documentElement.dataset.theme = savedTheme === "light" ? "light" : "dark";
        } catch {
          document.documentElement.dataset.theme = "dark";
        }
      })();
    </script>
    <link rel="icon" type="image/png" href="../favicon-face.png" />
    <link rel="apple-touch-icon" href="../favicon-face.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="project-shell" data-project-page data-project-key="mirar">
      <section class="project-topbar">
        <a class="icon-pill" href="../index.html#projects" aria-label="Back to projects">
          <img
            class="lucide-icon"
            src="../lucide-main/lucide-main/icons/arrow-left.svg"
            alt=""
            aria-hidden="true"
          />
        </a>
        <a class="icon-pill" href="../index.html" aria-label="Back to home">
          <img
            class="lucide-icon"
            src="../lucide-main/lucide-main/icons/house.svg"
            alt=""
            aria-hidden="true"
          />
        </a>
      </section>
      <section class="project-hero">
        <div class="project-heading-row">
          <div class="project-heading-copy">
            <h1 class="project-title" data-project-title></h1>
            <p class="project-meta" data-project-meta></p>
          </div>
          <a class="project-view-link" href="#case-study-start">View work</a>
        </div>
        <p class="project-intro" data-project-intro></p>
        <figure class="project-hero-media">
          <img class="project-cover-image" data-project-cover alt="" />
        </figure>
        <p class="project-caption" data-project-cover-caption></p>
        <div class="project-divider" aria-hidden="true"><span></span><span></span><span></span></div>
      </section>
      <section class="case-study" id="case-study-start" data-project-case-study></section>
      <nav class="project-pagination" data-project-pagination aria-label="Project navigation"></nav>
    </main>
    <script src="../script.js"></script>
  </body>
</html>
