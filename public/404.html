<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Redirecting...</title>
    <script>
      (function () {
        var redirectTarget =
          '/#' +
          window.location.pathname.replace(/^\//, '') +
          window.location.search +
          window.location.hash;

        window.location.replace(redirectTarget);
      })();
    </script>
  </head>
  <body></body>
  </html>
